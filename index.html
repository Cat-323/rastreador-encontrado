<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locatag Recuperado</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.15);
            --whatsapp: #22c55e;
            --call: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            color: white;
            padding: 20px;
            /* Fondo base que cambiará con JS */
            background: #0f172a; 
            transition: background 2s ease;
        }

        /* Efecto de Luces de Fondo */
        .aurora {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            filter: blur(100px);
            opacity: 0.5;
            pointer-events: none;
        }

        /* Contenedor Principal Adaptable */
        .main-layout {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column-reverse; /* Móvil: Info arriba, Foto abajo */
            gap: 30px;
            max-width: 900px;
            width: 100%;
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Lado de la Información */
        .info-card {
            background: var(--glass);
            backdrop-filter: blur(30px) saturate(150%);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 40px;
            flex: 1;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        /* Lado de la Imagen */
        .image-card {
            flex: 0.8;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .image-card img {
            width: 100%;
            max-width: 350px;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.5));
            animation: float 4s ease-in-out infinite;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .image-card img:hover { transform: scale(1.1) rotate(5deg); }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* Textos */
        h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 15px; line-height: 1.1; }
        p { color: rgba(255,255,255,0.8); font-size: 1.1rem; margin-bottom: 35px; }

        /* Botones y Contacto */
        .contact-box {
            background: rgba(255,255,255,0.05);
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .phone-number {
            display: block;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: #fff;
        }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .btn {
            padding: 14px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: white;
            transition: all 0.3s;
        }

        .btn-wa { background: rgba(34, 197, 94, 0.2); border: 1px solid var(--whatsapp); }
        .btn-wa:hover { background: var(--whatsapp); box-shadow: 0 0 20px rgba(34,197,94,0.4); }

        .btn-tel { background: rgba(59, 130, 246, 0.2); border: 1px solid var(--call); }
        .btn-tel:hover { background: var(--call); box-shadow: 0 0 20px rgba(59,130,246,0.4); }

        /* Layout para PC / Laptop */
        @media (min-width: 992px) {
            .main-layout {
                flex-direction: row; /* Texto izquierda, Imagen derecha */
                align-items: center;
            }
            .info-card { text-align: left; }
            h1 { font-size: 3.5rem; }
            .btn-group { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <!-- Capa de aurora aleatoria -->
    <div class="aurora" id="aurora"></div>

    <div class="main-layout">
        <!-- BLOQUE DE INFORMACIÓN -->
        <div class="info-card">
            <i class="fa-solid fa-satellite-dish" style="font-size: 2rem; color: #3b82f6; margin-bottom: 20px;"></i>
            <h1>¡Locatag<br>Encontrado!</h1>
            <p>Has localizado mi rastreador personal. Por favor, contáctame para coordinar la devolución.</p>

            <!-- Contacto 1 -->
            <div class="contact-box">
                <span class="phone-number">+51 941 179 456</span>
                <div class="btn-group">
                    <a href="https://wa.me/51941179456" class="btn btn-wa"><i class="fa-brands fa-whatsapp"></i> WhatsApp</a>
                    <a href="tel:+51941179456" class="btn btn-tel"><i class="fa-solid fa-phone"></i> Llamar</a>
                </div>
            </div>

            <!-- Contacto 2 -->
            <div class="contact-box">
                <span class="phone-number">+51 918 260 005</span>
                <div class="btn-group">
                    <a href="https://wa.me/51918260005" class="btn btn-wa"><i class="fa-brands fa-whatsapp"></i> WhatsApp</a>
                    <a href="tel:+51918260005" class="btn btn-tel"><i class="fa-solid fa-phone"></i> Llamar</a>
                </div>
            </div>
        </div>

        <!-- BLOQUE DE IMAGEN -->
        <div class="image-card">
            <img src="https://github.com/Cat-323/rastreador-encontrado/blob/main/variante_pure-1-removebg-preview.png?raw=true" alt="Locatag">
        </div>
    </div>

    <script>
        // Generador de fondo hermoso y aleatorio (Sin Morados)
        function generateBeautifulBackground() {
            const themes = [
                { bg: '#061626', colors: ['#00d2ff', '#3a7bd5', '#004e92'] }, // Deep Ocean
                { bg: '#0b201d', colors: ['#11998e', '#38ef7d', '#00b09b'] }, // Emerald City
                { bg: '#0f0c29', colors: ['#24243e', '#302b63', '#0f0c29'] }, // Space Blue
                { bg: '#134e5e', colors: ['#71b280', '#134e5e', '#082032'] }  // Forest Night
            ];
            
            const selected = themes[Math.floor(Math.random() * themes.length)];
            document.body.style.backgroundColor = selected.bg;
            
            const aurora = document.getElementById('aurora');
            aurora.style.background = `radial-gradient(circle at 50% 50%, ${selected.colors[0]} 0%, ${selected.colors[1]} 30%, ${selected.colors[2]} 100%)`;
        }

        window.onload = generateBeautifulBackground;

        // Efecto sutil de seguimiento de mouse en PC
        if (window.innerWidth > 992) {
            document.addEventListener('mousemove', (e) => {
                const moveX = (e.clientX - window.innerWidth/2) * 0.01;
                const moveY = (e.clientY - window.innerHeight/2) * 0.01;
                document.querySelector('.image-card img').style.transform = `translate(${moveX}px, ${moveY}px) scale(1.05)`;
            });
        }
    </script>
</body>
</html>

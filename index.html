<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locatag Recuperado - Objeto Encontrado</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #020617;
            --card-bg: rgba(15, 23, 42, 0.65);
            --card-border: rgba(255, 255, 255, 0.1);
            --accent-glow: #00d2ff;
            --whatsapp: #22c55e;
            --call: #3b82f6;
            --text-primary: #fff;
            --text-secondary: rgba(255, 255, 255, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* El canvas se encarga de todo el fondo */
            color: var(--text-primary);
            padding: 20px;
            background-color: var(--bg-dark);
        }

        /* Canvas para el fondo dinámico galáctico */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
        }

        /* Capa adicional para el efecto degradado turquesa intenso de escritorio */
        .desktop-bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* Contenedor principal adaptable */
        .main-layout {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column; /* Móvil: Info ARRIBA, Foto ABAJO */
            gap: 30px;
            max-width: 1000px;
            width: 100%;
            animation: cardFadeIn 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Tarjeta de Información (Estilo Glassmorphism Premium) */
        .info-card {
            background: var(--card-bg);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--card-border);
            border-radius: 48px;
            padding: 50px 40px;
            flex: 1.2;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.5);
            text-align: center;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 210, 255, 0.15);
            color: var(--accent-glow);
            padding: 10px 24px;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 25px;
            border: 1px solid rgba(0, 210, 255, 0.3);
        }

        h1 { font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 800; line-height: 1; margin-bottom: 20px; letter-spacing: -2px; }
        p { color: var(--text-secondary); font-size: 1.1rem; line-height: 1.6; margin-bottom: 40px; }

        /* Bloques de Contacto */
        .contact-block {
            background: rgba(255,255,255,0.03);
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .contact-block:hover {
            background: rgba(255,255,255,0.08);
            transform: scale(1.02);
            border-color: var(--accent-glow);
        }

        .phone-num {
            display: block;
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 18px;
            letter-spacing: 1px;
            color: var(--text-primary);
        }

        .action-buttons { display: grid; grid-template-columns: 1fr; gap: 12px; }

        .btn {
            padding: 16px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: white;
            transition: all 0.3s ease;
        }

        .btn-wa { background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.3); }
        .btn-wa:hover { background: var(--whatsapp); box-shadow: 0 15px 30px rgba(34,197,94,0.3); }

        .btn-call { background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3); }
        .btn-call:hover { background: var(--call); box-shadow: 0 15px 30px rgba(59,130,246,0.3); }

        /* Sección de Imagen (Rastreadores) */
        .image-section {
            flex: 0.8;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .floating-img {
            width: 100%;
            max-width: 450px;
            filter: drop-shadow(0 30px 60px rgba(0,0,0,0.6));
            animation: floatHero 6s ease-in-out infinite;
            transition: transform 0.5s ease;
        }

        .image-section:hover .floating-img { transform: scale(1.05) rotate(2deg); }

        @keyframes floatHero {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(3deg); }
        }

        /* Responsividad - Escritorio / PC */
        @media (min-width: 1024px) {
            .main-layout {
                flex-direction: row; /* Escritorio: Info IZQUIERDA, Foto DERECHA */
                align-items: center;
            }
            .info-card { text-align: left; }
            .info-card h1 { font-size: 4rem; }
            .image-section { align-items: flex-end; padding-left: 50px; }
            .desktop-bg-overlay {
                opacity: 1;
                background: radial-gradient(circle at 75% 50%, rgba(0, 145, 181, 0.4) 0%, rgba(15, 23, 42, 0) 60%);
            }
            .action-buttons { grid-template-columns: 1fr 1fr; }
        }

        /* Responsividad - Móvil / Tablet (para solucionar recorte) */
        @media (max-width: 768px) {
            body {
                overflow-y: auto; /* Permitir desplazamiento vertical */
                align-items: flex-start; /* Evitar que el centrado corte el contenido superior */
                padding-top: 40px;
            }
            .main-layout {
                flex-direction: column; /* Info ARRIBA, Foto ABAJO */
                margin-bottom: 40px;
            }
            .info-card {
                border-radius: 35px;
                padding: 30px 20px;
            }
            .phone-num { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="desktop-bg-overlay"></div>

    <div class="main-layout">
        <div class="info-card">
            <div class="badge">
                <i class="fa-solid fa-satellite-dish fa-fade"></i> SISTEMA DE LOCALIZACIÓN ACTIVO
            </div>
            <h1>Locatag<br>Recuperado</h1>
            <p>Has localizado un dispositivo privado. Te agradezco enormemente tu ayuda para devolverlo.</p>

            <div class="contact-block">
                <span class="phone-num">+51 941 179 456</span>
                <div class="action-buttons">
                    <a href="https://wa.me/51941179456" class="btn btn-wa"><i class="fa-brands fa-whatsapp"></i> WhatsApp</a>
                    <a href="tel:+51941179456" class="btn btn-tel"><i class="fa-solid fa-phone"></i> Llamar</a>
                </div>
            </div>

            <div class="contact-block">
                <span class="phone-num">+51 918 260 005</span>
                <div class="action-buttons">
                    <a href="https://wa.me/51918260005" class="btn btn-wa"><i class="fa-brands fa-whatsapp"></i> WhatsApp</a>
                    <a href="tel:+51918260005" class="btn btn-tel"><i class="fa-solid fa-phone"></i> Llamar</a>
                </div>
            </div>
        </div>

        <div class="image-section">
            <img src="https://github.com/Cat-323/rastreador-encontrado/blob/main/variante_pure-1-removebg-preview.png?raw=true" class="floating-img" alt="Locatag Hero">
        </div>
    </div>

    <script>
        // Fondo Dinámico Canvas (Mesh Gradient con tonos oceánicos profundos)
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let time = 0;

        // Paleta de colores para el degradado dinámico galáctico
        const colors = [
            [2, 6, 23],    // Dark Navy
            [15, 23, 42],  // Slate
            [0, 145, 181], // Cyan sutil
            [7, 89, 133]   // Ocean
        ];

        function animate() {
            const { width, height } = canvas;
            const gradient = ctx.createRadialGradient(
                width / 2 + Math.sin(time) * (width / 4),
                height / 2 + Math.cos(time * 0.7) * (height / 4),
                0,
                width / 2,
                height / 2,
                width
            );

            gradient.addColorStop(0, `rgb(${colors[2][0]}, ${colors[2][1]}, ${colors[2][2]})`);
            gradient.addColorStop(0.5, `rgb(${colors[0][0]}, ${colors[0][1]}, ${colors[0][2]})`);
            gradient.addColorStop(1, `rgb(${colors[1][0]}, ${colors[1][1]}, ${colors[1][2]})`);

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
            
            time += 0.01;
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        animate();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locatag - Objeto Encontrado</title>
    <!-- Fuentes y Iconos -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --accent: #7c3aed;
            --accent-light: #a78bfa;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            color: white;
            padding: 20px;
        }

        /* --- Fondo de Partículas (El toque extra) --- */
        .particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* --- Contenedor Principal --- */
        .glass-card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            animation: cardEntrance 1s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* --- Icono y Texto --- */
        .location-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            display: inline-block;
            background: linear-gradient(45deg, #fff, var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(124, 58, 237, 0.5));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        h1 { font-size: clamp(1.5rem, 5vw, 2.2rem); font-weight: 800; margin-bottom: 1rem; }
        p { color: rgba(255,255,255,0.7); line-height: 1.6; margin-bottom: 2rem; font-size: 1rem; }

        /* --- Botones de Contacto --- */
        .contact-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 2rem;
        }

        .contact-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 18px 24px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .contact-item:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(10px);
            border-color: var(--accent-light);
        }

        .contact-left { display: flex; align-items: center; gap: 15px; }
        .contact-left i { font-size: 1.3rem; color: var(--accent-light); }
        .contact-left span { font-weight: 600; font-size: 1.1rem; }

        .btn-action {
            background: var(--accent);
            padding: 8px 15px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* --- Imagen del Rastreador --- */
        .image-container {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            margin-top: 1.5rem;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .image-container img {
            width: 100%;
            display: block;
            transition: transform 0.5s;
        }

        .image-container:hover img { transform: scale(1.05); }

        /* --- Footer --- */
        .footer-text {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Adaptabilidad (Tablets y PC) */
        @media (min-width: 768px) {
            .glass-card { padding: 60px; max-width: 550px; }
        }
    </style>
</head>
<body>

    <!-- Partículas de fondo -->
    <canvas id="canvas" class="particles"></canvas>

    <div class="glass-card">
        <div class="location-icon">
            <i class="fa-solid fa-放射線 fa-beat-drop" style="--fa-animation-duration: 2s;"></i>
            <i class="fa-solid fa-satellite-dish"></i>
        </div>
        
        <h1>¡Locatag Encontrado!</h1>
        <p>Has localizado un rastreador privado. Te agradezco enormemente tu ayuda para devolverlo.</p>

        <div class="contact-grid">
            <!-- CONTACTO 1 -->
            <a href="https://wa.me/51941179456" class="contact-item">
                <div class="contact-left">
                    <i class="fa-brands fa-whatsapp"></i>
                    <span>+51 941 179 456</span>
                </div>
                <div class="btn-action">Chat</div>
            </a>

            <!-- CONTACTO 2 -->
            <a href="tel:+51918260005" class="contact-item">
                <div class="contact-left">
                    <i class="fa-solid fa-phone-flip"></i>
                    <span>+51 918 260 005</span>
                </div>
                <div class="btn-action">Llamar</div>
            </a>
        </div>

        <div class="image-container">
            <!-- Reemplaza esta URL por tu foto subida a GitHub -->
            <img src="https://github.com/Cat-323/rastreador-encontrado/blob/main/variante_pure-1-removebg-preview.png?raw=true" alt="Locatag">
        </div>

        <div class="footer-text">
            <i class="fa-solid fa-shield-heart"></i>
            Devolución segura y coordinada
        </div>
    </div>

    <script>
        // Script para el efecto de partículas "perfecto"
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for (let i = 0; i < 50; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 1,
                    speedX: Math.random() * 0.5 - 0.25,
                    speedY: Math.random() * 0.5 - 0.25,
                    opacity: Math.random() * 0.5
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                p.x += p.speedX;
                p.y += p.speedY;
                if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
                if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        init();
        animate();
    </script>
</body>
</html>
